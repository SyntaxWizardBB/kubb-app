name: kubb_app
description: "Kubb Club — Kubb tournament & training management"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: any

  kubb_domain:
    path: packages/kubb_domain

  flutter_riverpod: any
  riverpod_annotation: any
  go_router: any

  drift: any
  sqlite3_flutter_libs: ^0.5.41
  path_provider: any
  path: any

  supabase_flutter: ^2.5.0
  flutter_secure_storage: ^8.1.0
  cryptography: ^2.7.0
  bip39: ^1.0.6
  app_links: ^6.3.0
  connectivity_plus: ^6.0.5

  reactive_forms: any
  freezed_annotation: any
  json_annotation: any
  uuid: any
  logging: any
  collection: any

  url_launcher: ^6.3.2
  google_fonts: ^8.1.0
  lucide_icons: ^0.257.0
  package_info_plus: ^10.1.0
  fl_chart: ^0.69.0
  share_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  very_good_analysis: any
  sqlite3: ^2.9.0
  supabase: any

  build_runner: any
  drift_dev: any
  riverpod_generator: any
  riverpod_lint: any
  freezed: any
  json_serializable: any
  custom_lint: any
  mocktail: any
  golden_toolkit: any
  fake_async: ^1.3.1

flutter:
  uses-material-design: true
  generate: true
  fonts:
    - family: BricolageGrotesque
      fonts:
        - asset: assets/fonts/BricolageGrotesque-VariableFont.ttf
