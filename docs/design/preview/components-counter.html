<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--kc-bg);color:var(--kc-fg);font-family:var(--kc-font-ui);display:flex;gap:20px;align-items:center}
.counter{font-family:var(--kc-font-ui);font-weight:800;font-size:120px;line-height:0.85;letter-spacing:-0.05em;font-variant-numeric:tabular-nums;color:var(--kc-fg)}
.unit{font-family:var(--kc-font-ui);font-weight:600;font-size:20px;color:var(--kc-fg-muted)}
.stack{display:flex;flex-direction:column;gap:6px;font-family:var(--kc-font-mono);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--kc-fg-muted)}
.stack b{font-family:var(--kc-font-ui);font-weight:700;font-size:32px;letter-spacing:-0.02em;color:var(--kc-fg);text-transform:none}
.hit{color:var(--kc-hit)}
</style></head><body>
<div><div class="counter">11</div><div class="stack" style="margin-top:4px">Treffer von 17</div></div>
<div class="stack"><span>Würfe gesamt</span><b>17</b></div>
<div class="stack"><span>Miss</span><b style="color:var(--kc-miss)">6</b></div>
<div class="stack"><span>Heli</span><b style="color:var(--kc-heli)">0</b></div>
<div class="stack"><span>Quote</span><b class="hit">64<span class="unit" style="font-weight:600;font-size:18px">%</span></b></div>
</body></html>
