<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px 20px;background:var(--kc-bg);display:grid;grid-template-columns:repeat(4,1fr);gap:18px;font-family:var(--kc-font-mono);font-size:10px;color:var(--kc-fg-muted);letter-spacing:0.06em;text-transform:uppercase}
.cell{display:flex;flex-direction:column;align-items:center;gap:8px}
img{display:block;width:120px;height:120px}
.label{font-weight:700;color:var(--kc-stone-700)}
.sub{font-size:9px;color:var(--kc-fg-muted);text-transform:none;letter-spacing:0;font-family:var(--kc-font-ui);font-weight:400}
</style></head><body>
<div class="cell">
  <img src="../assets/logo-mark.svg" alt="Primary meadow badge"/>
  <div class="label">A · Meadow Badge</div>
  <div class="sub">logo-mark.svg · App icon (Primary)</div>
</div>
<div class="cell">
  <img src="../assets/logo-mark-chalk.svg" alt="Chalk sign variant"/>
  <div class="label">B · Chalk Sign</div>
  <div class="sub">logo-mark-chalk.svg · Pitch lines</div>
</div>
<div class="cell">
  <img src="../assets/logo-mark-ink.svg" alt="Ink variant"/>
  <div class="label">C · Ink Crest</div>
  <div class="sub">logo-mark-ink.svg · Dark / dusk</div>
</div>
<div class="cell">
  <img src="../assets/logo-mark-roundel.svg" alt="Roundel crest"/>
  <div class="label">D · Roundel Crest</div>
  <div class="sub">logo-mark-roundel.svg · Medal style</div>
</div>
</body></html>
