<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:var(--kc-bg);color:var(--kc-fg);font-family:var(--kc-font-ui);display:flex;gap:18px;flex-wrap:wrap}
.tile{width:200px;padding:16px;border-radius:18px;color:#fbfaf6;display:flex;flex-direction:column;justify-content:space-between;min-height:128px;box-shadow:var(--kc-shadow-1)}
.eyebrow{font-family:var(--kc-font-mono);font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;opacity:0.85}
.name{font-family:var(--kc-font-ui);font-weight:800;font-size:22px;letter-spacing:-0.02em;line-height:1.1;margin-top:4px}
.sub{font-size:12px;opacity:0.85;margin-top:2px}
.num{font-family:var(--kc-font-ui);font-weight:800;font-size:32px;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;text-align:right;margin-top:auto}
.meadow{background:var(--kc-meadow-500)}
.ink{background:var(--kc-stone-900)}
.wood{background:var(--kc-wood-500)}
</style></head><body>
<div class="tile meadow"><div><div class="eyebrow">Training</div><div class="name">Sniper</div><div class="sub">Trefferquote · Konstanz</div></div><div class="num">8 m</div></div>
<div class="tile ink"><div><div class="eyebrow">Training</div><div class="name">Finisseur</div><div class="sub">Match-Endspiel · 6 Stöcke</div></div><div class="num">7/3</div></div>
<div class="tile wood"><div><div class="eyebrow">Tournier</div><div class="name">Match-Modus</div><div class="sub">Vollspiel · 6 Stöcke / Halbsatz</div></div><div class="num">▶</div></div>
</body></html>
