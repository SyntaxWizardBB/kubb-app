<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--kc-bg);color:var(--kc-fg);font-family:var(--kc-font-mono);font-size:10px;display:flex;gap:24px;align-items:center}
.cell{display:flex;flex-direction:column;align-items:center;gap:8px}
.card{width:84px;height:60px;background:var(--kc-bg-raised);border-radius:10px}
.lab{color:var(--kc-fg-muted);font-weight:700}
.s1{box-shadow:var(--kc-shadow-1)}
.s2{box-shadow:var(--kc-shadow-2)}
.s3{box-shadow:var(--kc-shadow-3)}
.s4{box-shadow:var(--kc-shadow-4)}
.sp{box-shadow:var(--kc-shadow-pressed);background:var(--kc-bg-sunken)}
</style></head><body>
<div class="cell"><div class="card s1"></div><div class="lab">1 · hairline</div></div>
<div class="cell"><div class="card s2"></div><div class="lab">2 · card</div></div>
<div class="cell"><div class="card s3"></div><div class="lab">3 · sheet</div></div>
<div class="cell"><div class="card s4"></div><div class="lab">4 · modal</div></div>
<div class="cell"><div class="card sp"></div><div class="lab">pressed</div></div>
</body></html>
