<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px; background: var(--bk-bg); display:flex; gap: 22px; }
  .item { background: var(--bk-bg-raised); border-radius: 12px; width: 130px; height: 90px; display:flex; align-items:flex-end; padding: 10px; }
  .nm { font-family: var(--bk-font-mono); font-size: 10px; color: var(--bk-fg-muted); }
</style></head>
<body>
  <div style="display:flex;flex-direction:column;gap:6px">
    <div class="bk-overline">Elevation</div>
    <div style="display:flex;gap:18px">
      <div class="item" style="box-shadow:var(--bk-shadow-1)"><span class="nm">shadow-1</span></div>
      <div class="item" style="box-shadow:var(--bk-shadow-2)"><span class="nm">shadow-2</span></div>
      <div class="item" style="box-shadow:var(--bk-shadow-3)"><span class="nm">shadow-3</span></div>
      <div class="item" style="background:var(--bk-meadow-500);box-shadow:var(--bk-shadow-pressed)"><span class="nm" style="color:var(--bk-on-primary)">pressed</span></div>
    </div>
  </div>
</body></html>
