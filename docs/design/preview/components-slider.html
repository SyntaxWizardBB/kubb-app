<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px; background: var(--bk-bg); }
  .wrap { background: var(--bk-bg-raised); border-radius: 16px; padding: 16px; box-shadow: var(--bk-shadow-1); max-width: 520px; }
  .head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom: 10px; }
  .label { font-family: var(--bk-font-display); font-weight: 600; font-size: 14px; color: var(--bk-fg-muted); letter-spacing: 0.06em; text-transform: uppercase; }
  .val { font-family: var(--bk-font-display); font-weight: 800; font-size: 28px; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .track { position: relative; height: 8px; background: var(--bk-stone-100); border-radius: 999px; }
  .fill { position: absolute; left: 0; top: 0; bottom: 0; width: 60%; background: var(--bk-primary); border-radius: 999px; }
  .ticks { display:flex; justify-content:space-between; font-family: var(--bk-font-mono); font-size: 11px; color: var(--bk-fg-muted); margin-top: 8px; }
</style></head>
<body>
  <div class="bk-overline" style="margin-bottom:10px">Distance slider — 4.0 to 8.0 m</div>
  <div class="wrap">
    <div class="head"><span class="label">Distanz</span><span class="val">6.5 m</span></div>
    <div class="track"><div class="fill"></div></div>
    <div class="ticks"><span>4.0</span><span>5.0</span><span>6.0</span><span>7.0</span><span>8.0</span></div>
  </div>
</body></html>
