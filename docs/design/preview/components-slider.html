<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--kc-bg);color:var(--kc-fg);font-family:var(--kc-font-ui)}
.row{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.track{flex:1;height:8px;background:var(--kc-stone-100);border-radius:999px;position:relative}
.fill{position:absolute;left:0;top:0;bottom:0;border-radius:999px;background:var(--kc-meadow-500)}
.thumb{position:absolute;top:50%;width:24px;height:24px;border-radius:999px;background:#fff;box-shadow:var(--kc-shadow-2);transform:translate(-50%,-50%);border:2px solid var(--kc-meadow-500)}
.val{font-family:var(--kc-font-ui);font-weight:700;font-size:18px;min-width:64px;letter-spacing:-0.01em}
.lab{font-family:var(--kc-font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--kc-fg-muted);min-width:90px}
.ticks{position:absolute;inset:0;display:flex;justify-content:space-between;padding:0 2px}
.tick{width:2px;height:8px;background:var(--kc-stone-200)}
</style></head><body>
<div class="row"><div class="lab">Distanz</div><div class="track"><div class="fill" style="width:75%"></div><div class="thumb" style="left:75%"></div></div><div class="val">7.0 m</div></div>
<div class="row"><div class="lab">Felder</div><div class="track"><div class="ticks"><span class="tick"></span><span class="tick"></span><span class="tick"></span><span class="tick"></span><span class="tick"></span><span class="tick"></span></div><div class="fill" style="width:60%"></div><div class="thumb" style="left:60%"></div></div><div class="val">6 / 10</div></div>
<div class="row"><div class="lab">Basis Kubbs</div><div class="track"><div class="fill" style="width:33%"></div><div class="thumb" style="left:33%"></div></div><div class="val">3 / 9</div></div>
</body></html>
