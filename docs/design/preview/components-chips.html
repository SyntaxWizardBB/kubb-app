<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--kc-bg);color:var(--kc-fg);font-family:var(--kc-font-ui);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:6px;min-height:32px;padding:0 14px;border-radius:999px;font-size:13px;font-weight:600}
.tag{background:var(--kc-meadow-100);color:var(--kc-meadow-700)}
.tag2{background:var(--kc-wood-100);color:var(--kc-wood-700)}
.tag3{background:var(--kc-stone-100);color:var(--kc-stone-700)}
.solid{background:var(--kc-meadow-500);color:#fbfaf6}
.outline{background:transparent;box-shadow:inset 0 0 0 1.5px var(--kc-stone-900);color:var(--kc-fg)}
.toggle{background:var(--kc-stone-900);color:#fbfaf6}
.bad{background:#f8e2dd;color:#7a2517}
.heli{background:var(--kc-wood-100);color:var(--kc-wood-700)}
</style></head><body>
<span class="chip tag">Sniper</span>
<span class="chip tag2">Finisseur</span>
<span class="chip tag3">Match</span>
<span class="chip solid">8 m · aktiv</span>
<span class="chip outline">7/3 · Standard</span>
<span class="chip toggle">Heli ein</span>
<span class="chip bad">Strafkubb</span>
<span class="chip heli">Helikopter</span>
</body></html>
