<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--kc-bg);color:var(--kc-fg);font-family:var(--kc-font-mono);font-size:10px}
.row{display:flex;align-items:flex-end;gap:18px;flex-wrap:wrap}
.cell{display:flex;flex-direction:column;align-items:center;gap:6px}
.box{background:var(--kc-meadow-500);border-radius:4px}
.lab{color:var(--kc-fg-muted);font-weight:700}
.tok{font-family:var(--kc-font-ui);font-size:12px;font-weight:600}
</style></head><body>
<div class="row">
<div class="cell"><div class="box" style="width:4px;height:4px"></div><div class="lab">1 · 4</div></div>
<div class="cell"><div class="box" style="width:8px;height:8px"></div><div class="lab">2 · 8</div></div>
<div class="cell"><div class="box" style="width:12px;height:12px"></div><div class="lab">3 · 12</div></div>
<div class="cell"><div class="box" style="width:16px;height:16px"></div><div class="lab">4 · 16</div></div>
<div class="cell"><div class="box" style="width:20px;height:20px"></div><div class="lab">5 · 20</div></div>
<div class="cell"><div class="box" style="width:24px;height:24px"></div><div class="lab">6 · 24</div></div>
<div class="cell"><div class="box" style="width:32px;height:32px"></div><div class="lab">8 · 32</div></div>
<div class="cell"><div class="box" style="width:40px;height:40px"></div><div class="lab">10 · 40</div></div>
<div class="cell"><div class="box" style="width:48px;height:48px;outline:2px dashed var(--kc-meadow-700);outline-offset:2px"></div><div class="lab">12 · 48 ★</div></div>
<div class="cell"><div class="box" style="width:64px;height:64px;outline:2px dashed var(--kc-meadow-700);outline-offset:2px"></div><div class="lab">16 · 64 ★</div></div>
</div>
<div style="margin-top:14px;color:var(--kc-fg-muted);font-size:11px">★ 48 dp = touch floor · 64 dp = comfortable primary action</div>
</body></html>
