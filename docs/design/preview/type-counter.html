<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:var(--kc-bg);color:var(--kc-fg);display:flex;align-items:center;gap:32px}
.cell{display:flex;flex-direction:column;gap:6px}
.lab{font-family:var(--kc-font-mono);font-size:10px;color:var(--kc-fg-muted);letter-spacing:0.06em;text-transform:uppercase}
.counter{font-family:var(--kc-font-ui);font-weight:800;line-height:0.85;letter-spacing:-0.05em;font-variant-numeric:tabular-nums}
.hit{color:var(--kc-hit)}
.miss{color:var(--kc-miss)}
.heli{color:var(--kc-heli)}
</style></head><body>
<div class="cell"><div class="lab">Trefferquote</div><div class="counter hit" style="font-size:72px">64<span style="font-size:30px;font-weight:600">%</span></div></div>
<div class="cell"><div class="lab">Treffer</div><div class="counter" style="font-size:84px">11</div></div>
<div class="cell"><div class="lab">Miss</div><div class="counter miss" style="font-size:60px">6</div></div>
<div class="cell"><div class="lab">Streak</div><div class="counter" style="font-size:60px">14<span style="font-size:22px;font-weight:600;color:var(--kc-fg-muted)"> × hit</span></div></div>
</body></html>
