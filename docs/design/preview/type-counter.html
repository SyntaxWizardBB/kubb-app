<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bk-bg); display: flex; gap: 24px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 2px; }
  .nm { font-family: var(--bk-font-mono); font-size: 10px; color: var(--bk-fg-muted); }
</style></head>
<body>
  <div class="col">
    <div class="bk-overline">Hero counter</div>
    <div class="bk-counter-hero" style="color:var(--bk-fg)">128</div>
    <div class="nm">.bk-counter-hero — 120px / 800w / tnum</div>
  </div>
  <div class="col">
    <div class="bk-overline">Counter</div>
    <div class="bk-counter" style="color:var(--bk-meadow-600)">42</div>
    <div class="nm">.bk-counter — 84px / 700w</div>
  </div>
  <div class="col">
    <div class="bk-overline">Mono stat</div>
    <div class="bk-mono" style="font-size:32px;color:var(--bk-fg)">68.4 %</div>
    <div class="nm">.bk-mono — JetBrains</div>
  </div>
</body></html>
