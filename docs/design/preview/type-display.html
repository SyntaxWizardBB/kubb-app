<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bk-bg); }
  .row { display:grid; grid-template-columns: 90px 1fr; gap: 14px; align-items: baseline; padding: 10px 0; border-bottom: 1px solid var(--bk-line); }
  .row:last-child { border-bottom: 0; }
  .nm { font-family: var(--bk-font-mono); font-size: 11px; color: var(--bk-fg-muted); }
  .sp { color: var(--bk-fg); }
</style></head>
<body>
  <div class="bk-overline" style="margin-bottom:8px">Bricolage Grotesque — display & body</div>
  <div class="row"><div class="nm">.bk-display</div><div class="bk-display sp">Treffer 12</div></div>
  <div class="row"><div class="nm">.bk-h1</div><div class="bk-h1 sp">8m-Training</div></div>
  <div class="row"><div class="nm">.bk-h2</div><div class="bk-h2 sp">Finisseur 7/3</div></div>
  <div class="row"><div class="nm">.bk-h3</div><div class="bk-h3 sp">Stock 4 von 6</div></div>
  <div class="row"><div class="nm">.bk-body</div><div class="bk-body sp">Tipp Hit + nach jedem Treffer. Halte den Minus-Button für Mehrfach-Korrektur.</div></div>
</body></html>
