<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px; background: var(--bk-bg); display:flex; gap: 18px; align-items: center; }
  .card { background: var(--bk-bg-raised); border-radius: 16px; padding: 14px 16px; box-shadow: var(--bk-shadow-1); display:flex; flex-direction:column; gap: 6px; }
  .card .top { display:flex; align-items:center; gap: 10px; }
  .pill { background: var(--bk-stone-900); color: var(--bk-chalk-50); padding: 4px 10px; border-radius: 999px; font-family: var(--bk-font-display); font-weight:700; font-size: 12px; letter-spacing: 0.06em; }
  .row { display:flex; gap: 14px; align-items:baseline; }
  .num { font-family: var(--bk-font-display); font-weight: 800; font-size: 32px; line-height: 1; letter-spacing: -0.02em; }
  .meta { font-family: var(--bk-font-mono); font-size: 11px; color: var(--bk-fg-muted); }
  .ok { color: var(--bk-meadow-600); }
  .bad { color: var(--bk-miss); }
</style></head>
<body>
  <div class="card">
    <div class="top"><span class="pill">7 / 3</span><span class="meta">heute · 14:22</span></div>
    <div class="row"><span class="num ok">✓</span><span class="num">5</span><span class="meta">von 6 Stöcken · sauber</span></div>
  </div>
  <div class="card">
    <div class="top"><span class="pill" style="background:var(--bk-penalty)">7 / 3</span><span class="meta">heute · 13:48</span></div>
    <div class="row"><span class="num bad">✗</span><span class="num">6</span><span class="meta">Strafkubb · Stock 4</span></div>
  </div>
</body></html>
