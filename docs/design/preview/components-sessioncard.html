<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:var(--kc-bg);color:var(--kc-fg);font-family:var(--kc-font-ui);display:flex;flex-direction:column;gap:10px}
.row{display:grid;grid-template-columns:56px 80px 1fr auto;align-items:center;gap:10px;padding:12px 14px;background:var(--kc-bg-raised);border-radius:14px;box-shadow:var(--kc-shadow-1)}
.tag{font-family:var(--kc-font-mono);font-size:11px;font-weight:700;color:var(--kc-fg-muted);letter-spacing:0.06em;text-transform:uppercase}
.rate{font-family:var(--kc-font-ui);font-weight:700;font-size:18px;font-variant-numeric:tabular-nums}
.bad{color:var(--kc-miss)}
.sub{font-size:13px;color:var(--kc-fg-muted)}
.go{width:24px;height:24px;color:var(--kc-fg-muted)}
</style></head><body>
<div class="row"><span class="tag">Sniper</span><span class="rate">64 %</span><span class="sub">8.0 m · 36 Würfe · gestern</span><svg class="go" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg></div>
<div class="row"><span class="tag">Fin</span><span class="rate">✓ 5/6</span><span class="sub">7/3 · sauber · gestern</span><svg class="go" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg></div>
<div class="row"><span class="tag">Fin</span><span class="rate bad">✗ 6/6</span><span class="sub">5/5 · Strafkubb · vor 2 Tagen</span><svg class="go" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg></div>
</body></html>
