<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bk-bg); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .sw { border-radius: 6px; height: 64px; display: flex; align-items: flex-end; padding: 6px 8px; color: #fff; font-family: var(--bk-font-mono); font-size: 10px; }
  .sw.dark { color: var(--bk-stone-900); }
  .label { font-size: 11px; color: var(--bk-fg-muted); margin-top: 4px; font-family: var(--bk-font-mono);}
</style></head>
<body>
  <div class="bk-overline" style="margin-bottom:10px">Holz — Kubb Wood (accent)</div>
  <div class="row">
    <div><div class="sw dark" style="background:var(--bk-wood-50)">50</div><div class="label">#faf3e6</div></div>
    <div><div class="sw dark" style="background:var(--bk-wood-200)">200</div><div class="label">#e6c98c</div></div>
    <div><div class="sw dark" style="background:var(--bk-wood-400)">400★</div><div class="label">#c08a33</div></div>
    <div><div class="sw" style="background:var(--bk-wood-600)">600</div><div class="label">#80561c</div></div>
    <div><div class="sw" style="background:var(--bk-wood-800)">800</div><div class="label">#422c0e</div></div>
  </div>
</body></html>
