<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bk-bg); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .sw { border-radius: 6px; height: 64px; display: flex; align-items: flex-end; padding: 6px 8px; color: #fff; font-family: var(--bk-font-mono); font-size: 10px; }
  .sw.dark { color: var(--bk-stone-900); }
  .label { font-size: 11px; color: var(--bk-fg-muted); margin-top: 4px; font-family: var(--bk-font-mono);}
</style></head>
<body>
  <div class="bk-overline" style="margin-bottom:10px">Wiesen — Meadow Green (primary)</div>
  <div class="row">
    <div><div class="sw dark" style="background:var(--bk-meadow-50)">50</div><div class="label">#eef6ec</div></div>
    <div><div class="sw dark" style="background:var(--bk-meadow-200)">200</div><div class="label">#aed3a2</div></div>
    <div><div class="sw" style="background:var(--bk-meadow-500)">500★</div><div class="label">#3a7c2e</div></div>
    <div><div class="sw" style="background:var(--bk-meadow-700)">700</div><div class="label">#234e1c</div></div>
    <div><div class="sw" style="background:var(--bk-meadow-900)">900</div><div class="label">#112710</div></div>
  </div>
</body></html>
