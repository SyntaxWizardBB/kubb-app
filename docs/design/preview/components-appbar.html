<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--kc-bg);color:var(--kc-fg);font-family:var(--kc-font-ui)}
.bar{display:flex;align-items:center;justify-content:space-between;padding:12px 8px;background:var(--kc-bg);border-bottom:1px solid var(--kc-line)}
.btn{width:48px;height:48px;display:grid;place-items:center;background:transparent;border:0;color:var(--kc-fg);cursor:pointer}
.title{text-align:center;flex:1}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--kc-fg-muted)}
.name{font-family:var(--kc-font-ui);font-weight:700;font-size:18px;letter-spacing:-0.02em}
.ic{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
</style></head><body>
<div class="bar">
  <button class="btn" aria-label="Back"><svg class="ic" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
  <div class="title"><div class="eyebrow">Account</div><div class="name">Profil</div></div>
  <button class="btn" aria-label="Settings"><svg class="ic" viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9c.3.6.9 1 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg></button>
</div>
<div style="margin-top:14px;font-family:var(--kc-font-mono);font-size:10px;color:var(--kc-fg-muted);letter-spacing:0.06em;text-transform:uppercase">AppBar · Mobile · 48dp icon buttons · 11px eyebrow + 18px title</div>
</body></html>
