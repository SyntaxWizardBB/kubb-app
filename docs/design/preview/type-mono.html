<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--kc-bg);color:var(--kc-fg);font-family:var(--kc-font-mono);font-size:13px}
table{border-collapse:collapse;width:100%}
th,td{padding:6px 10px;text-align:left;border-bottom:1px solid var(--kc-line)}
th{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--kc-fg-muted)}
td.n{text-align:right;font-variant-numeric:tabular-nums}
.hit{color:var(--kc-hit);font-weight:700}
.miss{color:var(--kc-miss);font-weight:700}
.heli{color:var(--kc-heli);font-weight:700}
</style></head><body>
<table><thead><tr><th>#</th><th>Outcome</th><th>Distance</th><th>Streak</th><th>ms</th></tr></thead><tbody>
<tr><td>01</td><td class="hit">HIT</td><td class="n">8.0 m</td><td class="n">1</td><td class="n">1240</td></tr>
<tr><td>02</td><td class="hit">HIT</td><td class="n">8.0 m</td><td class="n">2</td><td class="n">  890</td></tr>
<tr><td>03</td><td class="miss">MISS</td><td class="n">8.0 m</td><td class="n">—</td><td class="n">1450</td></tr>
<tr><td>04</td><td class="heli">HELI</td><td class="n">7.0 m</td><td class="n">1</td><td class="n">1100</td></tr>
<tr><td>05</td><td class="hit">HIT</td><td class="n">7.0 m</td><td class="n">2</td><td class="n">  720</td></tr>
<tr><td>06</td><td class="hit">HIT</td><td class="n">6.0 m</td><td class="n">3</td><td class="n">  680</td></tr>
</tbody></table>
</body></html>
