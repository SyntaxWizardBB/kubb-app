<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bk-bg); }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .sw { border-radius: 6px; height: 60px; display: flex; align-items: flex-end; padding: 6px 8px; color: #fff; font-family: var(--bk-font-mono); font-size: 10px; }
  .sw.dark { color: var(--bk-stone-900); }
  .label { font-size: 10px; color: var(--bk-fg-muted); margin-top: 4px; font-family: var(--bk-font-mono);}
</style></head>
<body>
  <div class="bk-overline" style="margin-bottom:10px">Stein — Stone (neutrals)</div>
  <div class="row">
    <div><div class="sw dark" style="background:var(--bk-stone-50);box-shadow:inset 0 0 0 1px var(--bk-line)">50</div><div class="label">#f4f3f0</div></div>
    <div><div class="sw dark" style="background:var(--bk-stone-200)">200</div><div class="label">#cfccc1</div></div>
    <div><div class="sw" style="background:var(--bk-stone-400)">400</div><div class="label">#777567</div></div>
    <div><div class="sw" style="background:var(--bk-stone-600)">600</div><div class="label">#34322a</div></div>
    <div><div class="sw" style="background:var(--bk-stone-800)">800</div><div class="label">#161510</div></div>
    <div><div class="sw" style="background:var(--bk-stone-900)">900★</div><div class="label">#0c0b07</div></div>
  </div>
</body></html>
