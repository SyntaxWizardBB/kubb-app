<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:0;background:var(--kc-bg);font-family:var(--kc-font-ui);color:var(--kc-fg);height:300px;display:grid;grid-template-columns:repeat(4,1fr)}
.bg{position:relative;display:grid;place-items:center;color:#fbfaf6;text-align:center}
.bg .lab{font-family:var(--kc-font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;opacity:0.85}
.bg .name{font-family:var(--kc-font-display);font-weight:700;font-size:24px;letter-spacing:-0.02em;margin-top:6px;font-variation-settings:'opsz' 36}

.meadow{background:linear-gradient(180deg,#3a7c2e 0%,#2d6324 100%)}
.ink{background:#0c0b07}
.chalk{background:var(--kc-chalk-50);color:var(--kc-fg)}
.wood{background:linear-gradient(180deg,#a16f24 0%,#604015 100%)}
.chalk .pattern{position:absolute;inset:0;background-image:repeating-linear-gradient(90deg,transparent 0 28px,#e8e2d2 28px 30px);opacity:0.55}
</style></head><body>
<div class="bg meadow"><div><div class="lab">Meadow gradient</div><div class="name">Match-Tag.</div></div></div>
<div class="bg ink"><div><div class="lab">Ink — Night play</div><div class="name">Statistik</div></div></div>
<div class="bg chalk"><div class="pattern"></div><div style="position:relative"><div class="lab">Chalk · pitch lines</div><div class="name">Trainings­wiese</div></div></div>
<div class="bg wood"><div><div class="lab">Wood — Tournier</div><div class="name">Saison '25</div></div></div>
</body></html>
