<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--kc-bg);color:var(--kc-fg);font-family:var(--kc-font-ui);display:flex;gap:14px;align-items:center;flex-wrap:wrap}
button{min-height:48px;padding:0 18px;border-radius:12px;border:0;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
.primary{background:var(--kc-meadow-500);color:var(--kc-on-primary);box-shadow:var(--kc-shadow-1)}
.primary:hover{background:var(--kc-meadow-600)}
.secondary{background:transparent;color:var(--kc-fg);box-shadow:inset 0 0 0 1.5px var(--kc-stone-900)}
.ghost{background:transparent;color:var(--kc-fg)}
.danger{background:var(--kc-miss);color:var(--kc-on-danger)}
.accent{background:var(--kc-stone-900);color:var(--kc-chalk-50)}
.fab{min-height:56px;padding:0 22px 0 18px;border-radius:16px;background:var(--kc-meadow-600);color:#fff;box-shadow:var(--kc-shadow-2);font-size:17px}
</style></head><body>
<button class="primary">Primary action</button>
<button class="secondary">Secondary</button>
<button class="ghost">Ghost</button>
<button class="danger">Verwerfen</button>
<button class="accent">Match-Modus</button>
<button class="fab"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M12 5v14M5 12h14"/></svg> Training</button>
</body></html>
