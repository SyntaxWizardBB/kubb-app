<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--kc-bg);color:var(--kc-fg);font-family:var(--kc-font-mono);font-size:10px;display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end}
.cell{display:flex;flex-direction:column;align-items:center;gap:6px}
.box{width:72px;height:54px;background:var(--kc-meadow-500);color:#fbfaf6;display:grid;place-items:center;font-weight:700;font-family:var(--kc-font-ui);font-size:11px}
.lab{color:var(--kc-fg-muted)}
</style></head><body>
<div class="cell"><div class="box" style="border-radius:2px">xs</div><div class="lab">2px</div></div>
<div class="cell"><div class="box" style="border-radius:4px">sm</div><div class="lab">4px</div></div>
<div class="cell"><div class="box" style="border-radius:8px">md</div><div class="lab">8px</div></div>
<div class="cell"><div class="box" style="border-radius:12px">lg</div><div class="lab">12px</div></div>
<div class="cell"><div class="box" style="border-radius:16px">xl</div><div class="lab">16px</div></div>
<div class="cell"><div class="box" style="border-radius:20px">2xl</div><div class="lab">20px</div></div>
<div class="cell"><div class="box" style="border-radius:28px">3xl</div><div class="lab">28px</div></div>
<div class="cell"><div class="box" style="border-radius:999px;width:90px">pill</div><div class="lab">999px</div></div>
</body></html>
