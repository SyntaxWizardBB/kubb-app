<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bk-bg); }
  .grid { display:grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
  .item { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .box { width: 64px; height: 64px; background: var(--bk-meadow-500); }
  .nm { font-family: var(--bk-font-mono); font-size: 10px; color: var(--bk-fg-muted); text-align:center; }
</style></head>
<body>
  <div class="bk-overline" style="margin-bottom:10px">Radii — pitch tool, restrained</div>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:var(--bk-radius-xs)"></div><div class="nm">xs · 2</div></div>
    <div class="item"><div class="box" style="border-radius:var(--bk-radius-sm)"></div><div class="nm">sm · 4</div></div>
    <div class="item"><div class="box" style="border-radius:var(--bk-radius-md)"></div><div class="nm">md · 8</div></div>
    <div class="item"><div class="box" style="border-radius:var(--bk-radius-lg)"></div><div class="nm">lg · 12</div></div>
    <div class="item"><div class="box" style="border-radius:var(--bk-radius-xl)"></div><div class="nm">xl · 16</div></div>
    <div class="item"><div class="box" style="border-radius:var(--bk-radius-2xl)"></div><div class="nm">2xl · 20</div></div>
    <div class="item"><div class="box" style="border-radius:var(--bk-radius-pill)"></div><div class="nm">pill</div></div>
  </div>
</body></html>
