# Supabase CLI project config — local development only.
# The Hetzner production stack is configured separately (ADR-0009).

project_id = "kubb-app-local"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = true
ip_version = "IPv4"

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
# Local SMTP catch-all; we keep this on so OAuth-callback emails (if any
# Supabase ever sends despite our keypair-first design) land somewhere
# inspectable instead of trying to leave the dev box.
enabled = true
port = 54324

[storage]
# Not used by the auth feature. Disabled to keep the local stack lean.
enabled = false

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "kubbapp://auth/callback",
  "http://localhost:3000/auth/callback",
]
jwt_expiry = 3600
# refresh_token_rotation_enabled = true   # requires supabase-cli >= 2.7x
# refresh_token_reuse_interval = 10       # requires supabase-cli >= 2.7x
enable_signup = true
enable_anonymous_sign_ins = true

# Disable email-based signup paths — ADR-0010 removes magic-link entirely.
# OAuth providers are wired in below; keypair flow runs through custom
# Postgres functions (M2-T03/T04), not through GoTrue.
[auth.email]
enable_signup = false
double_confirm_changes = false
enable_confirmations = false

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.external.google]
enabled = false
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"
redirect_uri = ""

[auth.external.apple]
enabled = false
client_id = "env(SUPABASE_AUTH_APPLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_APPLE_SECRET)"
redirect_uri = ""

[edge_runtime]
# Required for the keypair-verify edge function (M8-T01) which performs
# the Ed25519 verify step that Postgres cannot do natively.
enabled = true

[analytics]
enabled = false

[functions.keypair-verify]
# Public verify endpoint. JWT verification stays off because the caller
# is on a fresh device with only an anonymous Supabase session and
# proves ownership via the signed challenge instead of via JWT.
verify_jwt = false
